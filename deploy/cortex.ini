# Cortex CaaS Configuration
# Override any value with CORTEX_<SECTION>_<KEY> environment variables.
# Example: CORTEX_SERVER_PORT=9000 overrides [server] port.

[server]
host = 0.0.0.0
port = 8421

[storage]
backend = sqlite
# db_path is set via CLI --db-path flag or CORTEX_STORAGE_DB_PATH

[logging]
level = INFO
# format: text or json (json recommended for containers)
format = text

[security]
csrf_enabled = true
ssrf_protection = true
content_type_validation = true

[sse]
enabled = false
buffer_size = 1000

[webhooks]
max_retries = 5
circuit_breaker_threshold = 5
dead_letter_enabled = true

[metrics]
enabled = false

[oauth]
# Configure via --oauth-provider CLI flags or env vars
# CORTEX_OAUTH_PROVIDER_<NAME>_CLIENT_ID
# CORTEX_OAUTH_PROVIDER_<NAME>_CLIENT_SECRET
