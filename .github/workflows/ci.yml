name: CI

on:
  push:
    branches: [main, "phase*"]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check cortex tests
      - run: ruff format --check cortex tests

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev,full]"
      - run: python -m pytest tests -q --tb=short

  extract-eval:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,full]"
      - name: Run extraction eval gate
        env:
          CORTEX_EXTRACTION_REPLAY: read
          CORTEX_EXTRACTION_REPLAY_DIR: tests/extraction/corpus/replay
          CORTEX_EXTRACTION_LOG_PATH: /tmp/cortex-extractions.jsonl
        run: >
          python -m cortex.cli extract eval
          --corpus tests/extraction/corpus
          --backend heuristic
          --output extraction-eval-report.json
          --tolerance 0.01
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extraction-eval-report
          path: extraction-eval-report.json

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,full]" pytest-cov
      - run: python -m pytest tests -q --tb=short --cov=cortex --cov-report=xml --cov-fail-under=75

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,full]" bandit pip-audit
      - run: bandit -r cortex/ -ll
      - run: pip-audit

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,full]" cyclonedx-bom
      - run: cyclonedx-py environment --output-format JSON --output-file sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-json
          path: sbom.json

  release-provenance:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build sigstore
      - run: python -m build --wheel
      - run: python -m sigstore sign dist/*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: signed-wheel-provenance
          path: |
            dist/*.whl
            dist/*.sigstore
            dist/*.crt
            dist/*.sig

  package-smoke:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: python -m pip install build
      - run: python -m build
      - run: python -m pip install dist/*.whl
      - run: cortexd --help >/dev/null
      - run: cortex-mcp --help >/dev/null
      - run: cortex-bench --help >/dev/null
      - run: cd sdk/typescript && npm pack --pack-destination ../../dist
      - run: |
          PACKAGE_TGZ=$(ls dist/*.tgz)
          mkdir -p /tmp/cortex-sdk-smoke
          cd /tmp/cortex-sdk-smoke
          npm init -y >/dev/null 2>&1
          npm install "$GITHUB_WORKSPACE/$PACKAGE_TGZ" >/dev/null
          node --input-type=module -e "import { MemorySession, SDK_VERSION } from '@cortex-ai/sdk'; console.log(typeof MemorySession, SDK_VERSION);"
      - run: python -m cortex.cli release-notes --output /tmp/release-notes.md --manifest-output /tmp/release-manifest.json

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push container image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/junebugg1214/cortex-ai:latest
            ghcr.io/junebugg1214/cortex-ai:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build container image for CI smoke
        if: github.ref != 'refs/heads/main' || github.event_name != 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: cortex-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker run --rm ghcr.io/junebugg1214/cortex-ai:latest --help >/dev/null
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      - run: docker run --rm --entrypoint cortex-mcp ghcr.io/junebugg1214/cortex-ai:latest --help >/dev/null
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      - run: docker run --rm cortex-ai:ci --help >/dev/null
        if: github.ref != 'refs/heads/main' || github.event_name != 'push'
      - run: docker run --rm --entrypoint cortex-mcp cortex-ai:ci --help >/dev/null
        if: github.ref != 'refs/heads/main' || github.event_name != 'push'
