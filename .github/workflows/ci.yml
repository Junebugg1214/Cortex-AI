name: CI

on:
  push:
    branches: [main, "phase*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check cortex/cli.py tests/test_caas_cli.py tests/test_phase7_cli.py tests/test_examples.py
      - run: ruff format --check cortex/cli.py tests/test_caas_cli.py tests/test_phase7_cli.py tests/test_examples.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev,full]"
      - run: python -m pytest tests/test_caas_cli.py tests/test_phase7_cli.py tests/test_examples.py -q --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ghcr.io/junebugg1214/cortex-ai:latest
            ghcr.io/junebugg1214/cortex-ai:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker run --rm ghcr.io/junebugg1214/cortex-ai:latest python -c "import cortex; print('OK')"
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      - run: docker build -t cortex-ai:ci . && docker run --rm cortex-ai:ci python -c "import cortex; print('OK')"
        if: github.ref != 'refs/heads/main' || github.event_name != 'push'
