name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install validation dependencies
        run: python -m pip install -e ".[dev,full]" build

      - name: Lint
        run: |
          ruff check cortex tests
          ruff format --check cortex tests

      - name: Run tests
        run: python -m pytest tests -q --tb=short

      - name: Compile Python modules
        run: python -m compileall cortex

      - name: Check TypeScript runtime
        run: node --check sdk/typescript/dist/index.js

      - name: Generate release notes and manifest
        run: |
          python -m cortex.cli release-notes \
            --output dist/release-notes.md \
            --manifest-output dist/release-manifest.json \
            --tag "${GITHUB_REF_NAME}" \
            --commit-sha "${GITHUB_SHA}"
          cp openapi/cortex-api-v1.json dist/cortex-api-v1.json
          cp openapi/cortex-api-v1-compat.json dist/cortex-api-v1-compat.json

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: |
            dist/release-notes.md
            dist/release-manifest.json
            dist/cortex-api-v1.json
            dist/cortex-api-v1-compat.json

  build-python:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload Python distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  smoke-python:
    needs: build-python
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Install wheel and smoke-check entrypoints
        run: |
          python -m pip install dist/*.whl
          cortex --help >/dev/null
          cortexd --help >/dev/null
          cortex-mcp --help >/dev/null
          cortex-bench --help >/dev/null

  pack-typescript:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pack TypeScript SDK
        run: |
          mkdir -p dist
          cd sdk/typescript
          npm pack --pack-destination ../../dist

      - name: Upload TypeScript package
        uses: actions/upload-artifact@v4
        with:
          name: typescript-package
          path: dist/*.tgz

  smoke-typescript:
    needs: pack-typescript
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download TypeScript package
        uses: actions/download-artifact@v4
        with:
          name: typescript-package
          path: dist

      - name: Install packed SDK and smoke-check imports
        run: |
          PACKAGE_TGZ=$(ls dist/*.tgz)
          mkdir -p /tmp/cortex-sdk-smoke
          cd /tmp/cortex-sdk-smoke
          npm init -y >/dev/null 2>&1
          npm install "$GITHUB_WORKSPACE/$PACKAGE_TGZ" >/dev/null
          node --input-type=module -e "import { MemorySession, SDK_VERSION } from '@cortex-ai/sdk'; console.log(typeof MemorySession, SDK_VERSION);"

  smoke-docker:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: cortex-ai:release-smoke
          build-args: |
            CORTEX_VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-check runtime entrypoints
        run: |
          docker run --rm cortex-ai:release-smoke --help >/dev/null
          docker run --rm --entrypoint cortex-mcp cortex-ai:release-smoke --help >/dev/null

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-python, smoke-python]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [pack-typescript, smoke-typescript]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish TypeScript SDK
        working-directory: sdk/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

  publish-docker:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: smoke-docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/junebugg1214/cortex-ai:${{ github.ref_name }}
            ghcr.io/junebugg1214/cortex-ai:${{ github.sha }}
            ghcr.io/junebugg1214/cortex-ai:latest
          build-args: |
            CORTEX_VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [validate, build-python, pack-typescript, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release metadata
        uses: actions/download-artifact@v4
        with:
          name: release-metadata
          path: dist

      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Download TypeScript package
        uses: actions/download-artifact@v4
        with:
          name: typescript-package
          path: dist

      - name: Publish GitHub release and assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: dist/release-notes.md
          files: |
            dist/release-manifest.json
            dist/cortex-api-v1.json
            dist/cortex-api-v1-compat.json
            dist/*.whl
            dist/*.tar.gz
            dist/*.tgz
