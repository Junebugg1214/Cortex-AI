services:
  cortex:
    build: .
    ports:
      - "8421:8421"
    volumes:
      - cortex-data:/data
      - ./deploy/cortex.ini:/etc/cortex/cortex.ini:ro
    env_file:
      - deploy/.env.example
    environment:
      - CORTEX_LOGGING_FORMAT=json
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8421/readyz')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: cortex
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex"]
      interval: 5s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    depends_on:
      cortex:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./deploy/grafana/provisioning/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./deploy/grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./deploy/grafana/cortex-overview.json:/var/lib/grafana/dashboards/cortex-overview.json:ro
      - ./deploy/grafana/cortex-graph.json:/var/lib/grafana/dashboards/cortex-graph.json:ro
      - ./deploy/grafana/cortex-webhooks.json:/var/lib/grafana/dashboards/cortex-webhooks.json:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

volumes:
  cortex-data:
  pg-data:
  prom-data:
  grafana-data:
