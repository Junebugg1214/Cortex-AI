<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex</title>
    <link rel="stylesheet" href="/app/styles.css">
</head>
<body>
    <!-- Top navigation bar -->
    <nav class="topnav">
        <div class="topnav-brand">
            <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2" fill="none"/>
                <circle cx="20" cy="12" r="3" fill="currentColor"/>
                <circle cx="12" cy="26" r="3" fill="currentColor"/>
                <circle cx="28" cy="26" r="3" fill="currentColor"/>
                <line x1="20" y1="15" x2="12" y2="23" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
                <line x1="20" y1="15" x2="28" y2="23" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
                <line x1="12" y1="26" x2="28" y2="26" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
            </svg>
            <span>Cortex</span>
        </div>
        <div class="topnav-tabs">
            <a href="#upload" class="tab-link active" data-page="upload">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <span>Upload</span>
            </a>
            <a href="#memory" class="tab-link" data-page="memory">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><circle cx="18" cy="6" r="3"/>
                    <line x1="8.5" y1="7.5" x2="15.5" y2="16.5"/>
                    <line x1="15.5" y1="6" x2="8.5" y2="6"/>
                </svg>
                <span>My Memory</span>
            </a>
            <a href="#share" class="tab-link" data-page="share">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
                    <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
                <span>Share</span>
            </a>
            <a href="#connectors" class="tab-link" data-page="connectors">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="8" width="7" height="8" rx="1.5"/>
                    <rect x="14" y="8" width="7" height="8" rx="1.5"/>
                    <path d="M10 12h4"/>
                </svg>
                <span>Connectors</span>
            </a>
            <a href="#profile" class="tab-link" data-page="profile">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>Profile</span>
            </a>
        </div>
        <div class="topnav-spacer"></div>
        <button id="logout-btn" class="btn btn-outline" style="font-size:13px;padding:6px 14px;display:none;">Logout</button>
    </nav>

    <!-- Journey / onboarding HUD -->
    <section id="app-hud" class="app-hud" style="display:none;"></section>

    <!-- Login overlay -->
    <div id="login-overlay" class="login-overlay" style="display:none;">
        <div class="login-modal">
            <div class="login-brand">
                <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="18" stroke="#4f46e5" stroke-width="2" fill="none"/>
                    <circle cx="20" cy="12" r="3" fill="#4f46e5"/>
                    <circle cx="12" cy="26" r="3" fill="#4f46e5"/>
                    <circle cx="28" cy="26" r="3" fill="#4f46e5"/>
                    <line x1="20" y1="15" x2="12" y2="23" stroke="#4f46e5" stroke-width="1.5" opacity="0.5"/>
                    <line x1="20" y1="15" x2="28" y2="23" stroke="#4f46e5" stroke-width="1.5" opacity="0.5"/>
                    <line x1="12" y1="26" x2="28" y2="26" stroke="#4f46e5" stroke-width="1.5" opacity="0.5"/>
                </svg>
                <span>Cortex</span>
            </div>
            <!-- Admin login form (single-user mode) -->
            <form id="login-form">
                <input type="password" id="login-password" class="login-input" placeholder="Enter password" autocomplete="current-password" required>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Sign In</button>
            </form>
            <!-- Multi-user login form -->
            <form id="user-login-form" style="display:none;">
                <input type="email" id="login-email" class="login-input" placeholder="Email" autocomplete="email" required style="margin-bottom:10px;">
                <input type="password" id="login-user-password" class="login-input" placeholder="Password" autocomplete="current-password" required>
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:10px;">Sign In</button>
            </form>
            <div id="login-error" class="login-error"></div>
            <!-- Signup link (shown in multi-user mode) -->
            <div id="signup-link" style="display:none;text-align:center;margin-top:16px;">
                <span style="color:#6b7280;font-size:14px;">Don't have an account? </span>
                <a href="#signup" id="goto-signup" style="color:#4f46e5;font-size:14px;text-decoration:none;">Create one</a>
            </div>
        </div>
    </div>

    <!-- Page container -->
    <main id="page-container">
        <div class="page-loading">Loading...</div>
    </main>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script src="/app/app.js"></script>
    <script src="/app/pages/upload.js"></script>
    <script src="/app/pages/memory.js"></script>
    <script src="/app/pages/share.js"></script>
    <script src="/app/pages/connectors.js"></script>
    <script src="/app/pages/profile.js"></script>
    <script src="/app/pages/signup.js"></script>
</body>
</html>
