<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex Dashboard</title>
    <link rel="stylesheet" href="/dashboard/styles.css">
</head>
<body>
    <!-- Login screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <div class="login-header">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="18" stroke="#3498db" stroke-width="2" fill="none"/>
                    <circle cx="20" cy="12" r="3" fill="#3498db"/>
                    <circle cx="12" cy="26" r="3" fill="#e74c3c"/>
                    <circle cx="28" cy="26" r="3" fill="#2ecc71"/>
                    <line x1="20" y1="15" x2="12" y2="23" stroke="#95a5a6" stroke-width="1.5"/>
                    <line x1="20" y1="15" x2="28" y2="23" stroke="#95a5a6" stroke-width="1.5"/>
                    <line x1="12" y1="26" x2="28" y2="26" stroke="#95a5a6" stroke-width="1.5"/>
                </svg>
                <h1>Cortex Dashboard</h1>
                <p>Enter your dashboard password to continue</p>
            </div>
            <form id="login-form" onsubmit="return false;">
                <input type="password" id="login-password" placeholder="Dashboard password" autofocus>
                <button type="submit" id="login-btn">Sign In</button>
                <div id="login-error" class="login-error" style="display:none"></div>
            </form>
        </div>
    </div>

    <!-- Main app shell -->
    <div id="app-shell" style="display:none">
        <nav id="sidebar">
            <div class="sidebar-header">
                <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
                    <circle cx="20" cy="20" r="18" stroke="#3498db" stroke-width="2" fill="none"/>
                    <circle cx="20" cy="12" r="3" fill="#3498db"/>
                    <circle cx="12" cy="26" r="3" fill="#e74c3c"/>
                    <circle cx="28" cy="26" r="3" fill="#2ecc71"/>
                    <line x1="20" y1="15" x2="12" y2="23" stroke="#95a5a6" stroke-width="1.5"/>
                    <line x1="20" y1="15" x2="28" y2="23" stroke="#95a5a6" stroke-width="1.5"/>
                    <line x1="12" y1="26" x2="28" y2="26" stroke="#95a5a6" stroke-width="1.5"/>
                </svg>
                <span>Cortex</span>
            </div>
            <ul class="nav-links">
                <li><a href="#/" data-page="overview" class="nav-link active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Overview
                </a></li>
                <li><a href="#/graph" data-page="graph" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><circle cx="18" cy="6" r="3"/><line x1="8.5" y1="7.5" x2="15.5" y2="16.5"/><line x1="15.5" y1="6" x2="8.5" y2="6"/></svg>
                    Graph Explorer
                </a></li>
                <li><a href="#/grants" data-page="grants" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    Grants
                </a></li>
                <li><a href="#/versions" data-page="versions" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
                    Versions
                </a></li>
                <li><a href="#/settings" data-page="settings" class="nav-link">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    Settings
                </a></li>
            </ul>
        </nav>
        <main id="content">
            <div id="page-container" class="page-container">
                <div class="loading">Loading...</div>
            </div>
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script src="/dashboard/app.js"></script>
    <script src="/dashboard/pages/overview.js"></script>
    <script src="/dashboard/pages/graph.js"></script>
    <script src="/dashboard/pages/grants.js"></script>
    <script src="/dashboard/pages/versions.js"></script>
    <script src="/dashboard/pages/settings.js"></script>
</body>
</html>
